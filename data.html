<!DOCTYPE html>
<html lang="de-ch">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />  <title>BABA DATABASE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="data-text">
    <h2>Statistik</h2>
    <p>Analyse deiner Spaziergänge</p>
  </div>

  <!-- Tab buttons: wechsel zw. tag/monat  -->
  <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('day-view', this)">Tagesansicht</button>
      <button class="tab-btn" onclick="switchTab('month-view', this)">Monatsverlauf</button>
  </div>


  <!-- DAY VIEW  -->
  <div id="day-view" class="tab-content active">
      
      <div class="date-picker-container">
          <input type="date" id="daySelector" class="baba-date-input">
      </div>

      <div class="stats-grid">
          <div class="stat-card">
              <span class="stat-value" id="val-speed">-- km/h</span>
              <span class="stat-label">Ø Speed</span>
          </div>
          <div class="stat-card">
              <span class="stat-value" id="val-time">-- h -- m</span>
              <span class="stat-label">Fahrzeit</span>
          </div>
          <div class="stat-card">
              <span class="stat-value" id="val-dist">-- km</span>
              <span class="stat-label">Distanz</span>
          </div>
      </div>

      <div id="walks-list-container" class="box-group" style="margin-top: 24px; margin-bottom: 40px;">
      </div>

  </div>


  <!-- MONTH VIEW  -->
  <div id="month-view" class="tab-content">
      <div class="site-box box-full">
          <p style="color: #868686; margin-bottom: 20px;">Letzte 30 Tage</p>
          <canvas id="monthlyChart" width="100" height="80"></canvas>
      </div>
  </div>

  <footer>
      <nav class="footer-nav">
        <a href="index.html">

          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
            <rect x="3" y="3" width="8" height="18" rx="1.5" fill="currentColor" />
            <rect x="13" y="3" width="8" height="8" rx="1.5" fill="currentColor" />
            <rect x="13" y="13" width="8" height="8" rx="1.5" fill="currentColor" />
          </svg>
          
          Dashboard
        </a>

        <a href="mapview.html">

          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z" fill="currentColor" />
          </svg>
          
          Karte
        </a>

        <a href="data.html" class="active">
          
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
            <rect x="3" y="11" width="4" height="10" rx="1" fill="currentColor" />
            <rect x="10" y="3" width="4" height="18" rx="1" fill="currentColor" />
            <rect x="17" y="8" width="4" height="13" rx="1" fill="currentColor" />
          </svg>
          
          Statistik
        </a>

        <a href="protected.html">
          
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
            <!-- Head -->
            <circle cx="12" cy="8" r="5" fill="currentColor" />
            <!-- Body/Shoulders -->
            <path d="M12 15c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5z" fill="currentColor" />
          </svg>

          Profil
        </a>
      </nav>
  </footer>

  <!-- JS: mit skript für wechselnde Tabs -->

  <script>
      function switchTab(tabId, btnElement) {
          // Hide all contents
          document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
          // Deselect all buttons
          document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
          
          // Show the clicked tab and highlight the button
          document.getElementById(tabId).classList.add('active');
          btnElement.classList.add('active');
      }
  </script>
  <script src="js/protected.js"></script>
  <script src="js/data.js"></script>
    
</body>
</html>
