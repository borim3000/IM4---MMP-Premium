<!DOCTYPE html>
<html lang="de-ch">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABA DATABASE</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <button onclick="window.location.href='index.html'">Home</button>

    <h2>neuer eintrag into DB</h2>
    <section id="entry-form">
        <div>
            <label for="wertInput">Neuer Wert:</label>
            <input type="number" id="wertInput" step="0.1" placeholder="e.g. 35.5">
        </div>

        <button onclick="sendData()">Save Recording</button>
    </section>

    <hr>

    <h2>neuste einträge</h2>
    <table border="1" id="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Wert</th>
                <th>Zeit</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="data-display">
            </tbody>
    </table>

    <script src="js/protected.js"></script>
    <script src="js/data.js"></script>
    
</body>
</html>
